["p/manage-batch-hits"]
  default = """
<p>Este formulário permite remover ou renomear várias páginas, colando o conteúdo de um arquivo de texto. A sintaxe é:</p>
<pre>
# Cerquilha denota um comentário, mas somente no início de uma linha (que pode ser indentada).
delete path
rename src dst
</pre>

<p>O comando e o(s) argumento(s) são separados por um número qualquer de espaços e/ou tabulações.</p>

<p>Comando aceitados são <code>delete</code> para excluir visualizações de páginas, e <code>rename</code> para renomear o caminho. O nome do comando não diferencia maiúsculas e minúsculas, então, por exemplo, <code>DELETE</code> ou <code>dELeTe</code> também funcionam. O comando pode ser indentado com espaços ou tabulações.</p>

<p>Ao renomear, a contagem de acessos serão fundidas caso o caminho de destino já exista.</p>

<p>Você pode usar placeholders SQL conforme documentado na página <a
href=\"%(base)/settings/purge\">Gerenciar Visualizações de Páginas</a>. Além disso, o padrão pode começar com <code>(?i)</code> para ignorar maiúsculas e minúsculas. O caminho de destino para renomeações não aceita quaisquer placeholders ou <code>(?i)</code> e precisa ser uma correspondência exata (ou um novo caminho).</p>

<p>Você receberá uma pré-visualização antes que qualquer alteração seja feita.</p>

<p>Exemplo:</p>

<pre>
delete /foo
delete (?i)/archive/%

# Transfere de /weblog/*.html para /*.html.
RENAME   /weblog/page.html   /page.html
RENAME   /weblog/other.html  /other.html
</pre>
"""

