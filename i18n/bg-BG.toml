<pre>
# Диезът (hash) обозначава коментар, но само в началото на реда (може да бъде с отстъп).
delete path
rename src dst
</pre>

<p>Командата и аргументът(ите) са разделени от произволен брой интервали и/или
табулации.</p>

<p>Приеманите команди са <code>delete</code> за изтриване на показвания на страници и
<code>rename</code> за преименуване на пътя. Името на командата не е чувствително към регистъра (главни/малки букви), така че
напр. <code>DELETE</code> или <code>dELeTe</code> също работи. Допустимо е да има отстъп на
командата с интервали или табулации.</p>

<p>При преименуване броят на посещенията ще бъде обединен, ако целевият път вече съществува.</p>

<p>Можете да използвате SQL контейнери (placeholders), както е документирано на страницата <a
href=\"%(base)/settings/purge\">Управление на показванията на страници</a>. В допълнение, шаблонът може
да започне с <code>(?i)</code> за съвпадения без разграничаване на главни и малки букви. Целевият
път за преименуване не приема никакви контейнери или <code>(?i)</code> и трябва
да бъде точно съвпадение (или нов път).</p>

<p>Ще получите преглед, преди да бъде променено каквото и да било.</p>

<p>Пример:</p>

<pre>
delete /foo
delete (?i)/archive/%

# Преместване от /weblog/*.html към /*.html.
RENAME   /weblog/page.html   /page.html
RENAME   /weblog/other.html  /other.html
</pre>
